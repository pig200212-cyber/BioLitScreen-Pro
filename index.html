<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioLitScreen Pro v2 — 六合一全能文獻搜尋引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
  --border: rgba(255,255,255,0.07); --text: #e8edf5; --text2: #8b97b0; --text3: #5c6b82;
  --accent: #3b82f6; --purple: #8b5cf6; --green: #10b981; --amber: #f59e0b; --cyan: #06b6d4;
  --r: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
.topbar { background: rgba(11,15,26,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--green)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
.shell { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

<style>
/* --- 搜尋區塊強化修正 --- */
.search-card { 
  background: var(--bg2); 
  border: 1px solid var(--border); 
  border-radius: var(--r); 
  padding: 24px; /* 增加內距 */
  margin-bottom: 20px; 
}

.search-input-group { 
  display: flex; 
  gap: 12px; 
  margin-bottom: 16px; 
  flex-wrap: wrap; /* 關鍵：寬度不足時自動換行 */
}

.input-wrapper { 
  position: relative; 
  flex: 1; 
  min-width: 260px; /* 確保搜尋框不會縮太小 */
}

/* 搜尋按鈕微調 */
.btn-search { 
  background: var(--accent); 
  color: #fff; 
  border: none; 
  padding: 0 32px; 
  height: 50px; 
  border-radius: 8px; 
  font-weight: 600; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  gap: 8px; 
  transition: 0.2s; 
  white-space: nowrap;
  font-size: 15px;
}

/* 針對窄螢幕的優化 */
@media (max-width: 600px) {
  .btn-search {
    width: 100%; /* 手機版按鈕撐滿，解決擠壓問題 */
  }
  .search-input-group {
    gap: 16px;
  }
}

.btn-search:hover { background: #2563eb; transform: translateY(-1px); }

/* PICO 區塊增加頂部間距，確保不被上方按鈕壓到 */
.pico-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  gap: 12px;
  margin-top: 10px; 
}
</style>

<div class="search-card">
  <div class="search-input-group">
    <div class="input-wrapper">
      <i class="ti ti-search"></i>
      <input type="text" id="mainQ" placeholder="輸入搜尋課題 (例如: Acteoside A549)...">
    </div>
    <button class="btn-search" onclick="runUltraSearch()">
      <i class="ti ti-search"></i> 搜尋文獻
    </button>
  </div>
  
  <div class="pico-grid">
    <div class="pico-item"><div class="pico-label">Population</div><input id="picoP" placeholder="目標細胞/群體"></div>
    <div class="pico-item"><div class="pico-label">Intervention</div><input id="picoI" placeholder="處理措施/藥物"></div>
  </div>
</div>

  <div id="resultsArea">
    <div style="text-align:center; padding:100px 20px; color:var(--text3)">
      <i class="ti ti-world-search" style="font-size:48px; margin-bottom:15px; display:block; opacity:0.5"></i>
      <p>準備就緒。系統將同時從 PubMed, SS, PMC, Crossref 等資料庫抓取結果。</p>
    </div>
  </div>
</main>

<script>
// JavaScript 邏輯與之前版本相同...
async function runUltraSearch() {
    const q = document.getElementById('mainQ').value;
    const p = document.getElementById('picoP').value;
    const i = document.getElementById('picoI').value;
    if (!q && !p && !i) return;

    const fullQuery = `${q} ${p} ${i}`.trim();
    const area = document.getElementById('resultsArea');
    area.innerHTML = '<div class="loading-box"><i class="ti ti-loader-2 ti-spin" style="font-size:32px"></i><p style="margin-top:15px; font-weight:500">正在同步調取全球資料庫...</p></div>';

    try {
        const [resPM, resSS, resEP, resCR] = await Promise.all([
            fetchPubMed(fullQuery),
            fetchSemanticScholar(fullQuery),
            fetchEuropePMC(fullQuery),
            fetchCrossref(fullQuery)
        ]);

        const combined = [...resSS, ...resEP, ...resCR, ...resPM];
        renderResults(combined);
    } catch (err) {
        area.innerHTML = '<div class="loading-box">連線異常，請稍後再試。</div>';
    }
}

async function fetchPubMed(q) {
    try {
        const r1 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(q)}&retmode=json&retmax=4`).then(r=>r.json());
        const ids = r1.esearchresult.idlist;
        if (!ids.length) return [];
        const r2 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`).then(r=>r.json());
        return ids.map(id => ({
            title: r2.result[id].title, date: r2.result[id].pubdate, author: r2.result[id].authors[0]?.name || 'N/A',
            source: 'PubMed', tag: 'tag-pubmed', url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`,
            doi: r2.result[id].elocationid?.replace('doi: ', '')
        }));
    } catch { return []; }
}

async function fetchSemanticScholar(q) {
    try {
        const r = await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(q)}&limit=4&fields=title,authors,year,url,tldr,abstract,externalIds`).then(r=>r.json());
        return (r.data || []).map(item => ({
            title: item.title, date: item.year, author: item.authors[0]?.name || 'N/A',
            tldr: item.tldr?.text, abstract: item.abstract, source: 'Semantic Scholar', tag: 'tag-ss',
            url: item.url, doi: item.externalIds?.DOI
        }));
    } catch { return []; }
}

async function fetchEuropePMC(q) {
    try {
        const r = await fetch(`https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${encodeURIComponent(q)}&format=json&pageSize=4`).then(r=>r.json());
        return (r.resultList.result || []).map(item => ({
            title: item.title, date: item.pubYear, author: item.authorString.split(',')[0],
            abstract: item.abstractText, source: 'Europe PMC', tag: 'tag-epmc',
            url: `https://europepmc.org/article/MED/${item.id}`, doi: item.doi
        }));
    } catch { return []; }
}

async function fetchCrossref(q) {
    try {
        const r = await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(q)}&rows=4`).then(r=>r.json());
        return (r.message.items || []).map(item => ({
            title: item.title[0], date: item.created['date-parts'][0][0],
            author: item.author ? item.author[0].family : 'N/A',
            source: 'Crossref', tag: 'tag-crossref',
            url: item.URL, doi: item.DOI
        }));
    } catch { return []; }
}

async function findPDF(doi) {
    if (!doi) return null;
    try {
        const up = await fetch(`https://api.unpaywall.org/v2/${doi}?email=paper@edu.tw`).then(r=>r.json());
        if (up.is_oa) return { url: up.best_oa_location.url_for_pdf, type: 'oa' };
        
        const core = await fetch(`https://api.core.ac.uk/v3/search/works?q=doi:"${doi}"`).then(r=>r.json());
        if (core.results?.[0]?.downloadUrl) return { url: core.results[0].downloadUrl, type: 'core' };
    } catch {}
    return null;
}

function renderResults(items) {
    const area = document.getElementById('resultsArea');
    area.innerHTML = '';
    
    items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = `lit-card ${item.tag}`;
        const docId = `pdf-${idx}`;
        
        card.innerHTML = `
            <div class="source-tag">${item.source}</div>
            <a href="${item.url}" target="_blank" class="card-title">${item.title}</a>
            <div class="card-meta">
                <span><i class="ti ti-calendar"></i> ${item.date}</span>
                <span><i class="ti ti-user"></i> ${item.author} et al.</span>
                ${item.doi ? `<span style="opacity:0.5">DOI: ${item.doi}</span>` : ''}
            </div>
            ${item.tldr ? `<div class="card-tldr"><strong>核心摘要:</strong> ${item.tldr}</div>` : ''}
            <div class="card-abstract">${item.abstract || '點擊標題開啟資料庫原文...'}</div>
            <div id="${docId}"></div>
        `;
        area.appendChild(card);

        if (item.doi) {
            findPDF(item.doi).then(res => {
                if (res) {
                    const label = res.type === 'oa' ? '免費 PDF (Unpaywall)' : '全文備份 (CORE)';
                    const cls = res.type === 'oa' ? '' : 'core';
                    document.getElementById(docId).innerHTML = `<a href="${res.url}" target="_blank" class="pdf-btn ${cls}"><i class="ti ti-file-download"></i> ${label}</a>`;
                }
            });
        }
    });
}
</script>
</body>
</html>
