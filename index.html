<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioLitScreen Pro v3.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
  --border: rgba(255,255,255,0.07); --text: #e8edf5; --text2: #8b97b0; --text3: #5c6b82;
  --accent: #3b82f6; --purple: #8b5cf6; --green: #10b981; --amber: #f59e0b; --cyan: #06b6d4;
  --r: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
.topbar { background: rgba(11,15,26,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--green)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
.shell { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

/* 搜尋區塊 */
.search-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 20px; }
.search-input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.input-wrapper { position: relative; flex: 1; min-width: 250px; }
.input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.input-wrapper input { width: 100%; padding: 14px 14px 14px 42px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }

.btn-search { background: var(--accent); color: #fff; border: none; padding: 0 24px; height: 50px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }

/* 勾選清單懸浮列 */
.cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 24px; border-radius: 40px; display: none; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(59,130,246,0.4); z-index: 1000; }
.cart-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* 卡片佈局微調 */
.lit-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 16px; position: relative; border-left: 4px solid transparent; display: flex; gap: 16px; }
.check-area { flex-shrink: 0; padding-top: 4px; }
.check-area input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.content-area { flex: 1; }

.card-title { font-size: 17px; font-weight: 600; color: var(--text); text-decoration: none; display: block; margin-bottom: 8px; }
.card-meta { font-size: 12px; color: var(--text3); margin-bottom: 10px; }

/* 彈窗樣式 */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: var(--bg2); width: 100%; max-width: 600px; border-radius: 16px; padding: 24px; position: relative; border: 1px solid var(--border); }
#citationText { background: var(--bg3); padding: 15px; border-radius: 8px; color: var(--text2); font-family: monospace; font-size: 13px; white-space: pre-wrap; margin-top: 15px; border: 1px dashed var(--border); }

.tag-pubmed { border-left-color: var(--accent); }
.tag-ss { border-left-color: var(--purple); }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo-mark"><i class="ti ti-bookmarks"></i></div>
  <div>
    <div style="font-size:15px; font-weight:600">BioLitScreen Pro</div>
    <div style="font-size:11px; color:var(--text3)">v3.5 | 文獻管理與引用工具</div>
  </div>
</header>

<main class="shell">
  <div class="search-card">
    <div class="search-input-group">
      <div class="input-wrapper"><i class="ti ti-search"></i><input type="text" id="mainQ" placeholder="搜尋並開始勾選文獻..."></div>
      <button class="btn-search" onclick="runUltraSearch()"><i class="ti ti-bolt"></i> 搜尋</button>
    </div>
  </div>
  <div id="resultsArea"></div>
</main>

<div id="cartBar" class="cart-bar">
  <span id="cartCount">已選取 0 篇文獻</span>
  <button class="cart-btn" onclick="generateAPA()"><i class="ti ti-file-text"></i> 生成 APA 格式</button>
  <button class="cart-btn" style="background:transparent" onclick="clearCart()">清除清單</button>
</div>

<div id="citationModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0">APA 第七版引用格式</h3>
    <div id="citationText"></div>
    <button class="btn-search" style="margin-top:20px; width:100%" onclick="copyCitation()">複製到剪貼簿</button>
    <button style="margin-top:10px; background:none; border:none; color:var(--text3); cursor:pointer; width:100%" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
let selectedPapers = []; // 存儲勾選的文獻物件

async function runUltraSearch() {
    const q = document.getElementById('mainQ').value;
    if (!q) return;
    document.getElementById('resultsArea').innerHTML = '<div style="text-align:center; padding:100px; color:var(--accent)"><i class="ti ti-loader-2 ti-spin" style="font-size:32px"></i></div>';
    
    // 這裡我們暫用一個 API (Crossref) 作為演示，實作時會整合之前的 4 個 API
    try {
        const r = await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(q)}&rows=10`).then(r=>r.json());
        renderResults(r.message.items.map(item => ({
            id: item.DOI,
            title: item.title[0],
            year: item.created['date-parts'][0][0],
            author: item.author ? item.author.map(a => `${a.family}, ${a.given?.[0] || ''}.`).join(', ') : 'N/A',
            journal: item['container-title']?.[0] || 'Unknown Journal',
            doi: item.DOI,
            url: item.URL
        })));
    } catch (err) { console.error(err); }
}

function renderResults(items) {
    const area = document.getElementById('resultsArea');
    area.innerHTML = '';
    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'lit-card tag-ss';
        card.innerHTML = `
            <div class="check-area">
                <input type="checkbox" onchange='togglePaper(${JSON.stringify(item).replace(/'/g, "&apos;")}, this.checked)'>
            </div>
            <div class="content-area">
                <a href="${item.url}" target="_blank" class="card-title">${item.title}</a>
                <div class="card-meta">
                    <i class="ti ti-calendar"></i> ${item.year} | <i class="ti ti-user"></i> ${item.author}
                </div>
                <div style="font-size:12px; color:var(--accent)">DOI: ${item.doi}</div>
            </div>
        `;
        area.appendChild(card);
    });
}

function togglePaper(paper, isChecked) {
    if (isChecked) {
        selectedPapers.push(paper);
    } else {
        selectedPapers = selectedPapers.filter(p => p.doi !== paper.doi);
    }
    updateCartBar();
}

function updateCartBar() {
    const bar = document.getElementById('cartBar');
    const count = document.getElementById('cartCount');
    if (selectedPapers.length > 0) {
        bar.style.display = 'flex';
        count.innerText = `已選取 ${selectedPapers.length} 篇文獻`;
    } else {
        bar.style.display = 'none';
    }
}

function generateAPA() {
    let apaStr = "";
    selectedPapers.forEach(p => {
        // 簡單的 APA 7th 邏輯: Author. (Year). Title. Journal. https://doi.org/DOI
        apaStr += `${p.author} (${p.year}). ${p.title}. ${p.journal}. https://doi.org/${p.doi}\n\n`;
    });
    document.getElementById('citationText').innerText = apaStr;
    document.getElementById('citationModal').style.display = 'flex';
}

function copyCitation() {
    const text = document.getElementById('citationText').innerText;
    navigator.clipboard.writeText(text).then(() => alert("引用格式已複製！"));
}

function closeModal() { document.getElementById('citationModal').style.display = 'none'; }
function clearCart() { selectedPapers = []; updateCartBar(); document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false); }
</script>
</body>
</html>-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioLitScreen Pro v3.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
  --border: rgba(255,255,255,0.07); --text: #e8edf5; --text2: #8b97b0; --text3: #5c6b82;
  --accent: #3b82f6; --purple: #8b5cf6; --green: #10b981; --amber: #f59e0b; --cyan: #06b6d4;

}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
.topbar { background: rgba(11,15,26,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--green)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }
.shell { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

/* 搜尋區塊排版 */
.search-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
.search-input-group { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.input-wrapper { position: relative; flex: 1; min-width: 280px; }
.input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.input-wrapper input { width: 100%; padding: 14px 14px 14px 42px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-size: 14px; box-sizing: border-box; }

.btn-search { 
  background: var(--accent); color: #fff; border: none; padding: 0 28px; height: 50px; border-radius: 8px; font-weight: 600; cursor: pointer; 
  display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; flex-shrink: 0; transition: 0.2s;
}
.btn-search:hover { background: #2563eb; transform: translateY(-1px); }

/* 篩選器樣式 */
.filter-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
.filter-item { flex: 1; min-width: 150px; background: var(--bg3); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
.filter-item label { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; white-space: nowrap; }
.filter-item input { background: transparent; border: none; color: var(--accent); font-size: 13px; font-weight: 600; outline: none; width: 100%; }

/* 結果卡片樣式 */
.lit-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 16px; position: relative; border-left: 4px solid transparent; transition: 0.2s; }
.card-title { font-size: 17px; font-weight: 600; color: var(--text); text-decoration: none; display: block; margin-bottom: 10px; line-height: 1.5; padding-right: 100px; }
.card-meta { font-size: 12px; color: var(--text3); margin-bottom: 15px; display: flex; gap: 12px; flex-wrap: wrap; }
.source-tag { position: absolute; top: 24px; right: 24px; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; background: rgba(255,255,255,0.05); }

.action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
.doi-download-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; text-decoration: none; background: var(--green); color: #fff; }
.secondary-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 6px; font-size: 13px; background: var(--bg3); color: var(--text2); text-decoration: none; border: 1px solid var(--border); }

.tag-pubmed { border-left-color: var(--accent); }
.tag-ss { border-left-color: var(--purple); }
.tag-epmc { border-left-color: var(--green); }
.tag-crossref { border-left-color: var(--cyan); }
</style>

<body>

<header class="topbar">
  <div class="logo-mark"><i class="ti ti-microscope"></i></div>
  <div>
    <div style="font-size:15px; font-weight:600">BioLitScreen Pro</div>
    <div style="font-size:11px; color:var(--text3)">文獻檢索系統 v3.0 | 年份篩選整合版</div>
  </div>
</header>

<main class="shell">
  <div class="search-card">
    <div class="search-input-group">
      <div class="input-wrapper">
        <i class="ti ti-search"></i>
        <input type="text" id="mainQ" placeholder="輸入關鍵字 (如: A549 Cistanche)...">
      </div>
      <button class="btn-search" onclick="runUltraSearch()">
        <i class="ti ti-search"></i> 搜尋文獻
      </button>
    </div>
    
    <div class="filter-row">
      <div class="filter-item">
        <label>開始年份</label>
        <input type="number" id="startYear" placeholder="2020" value="2018">
      </div>
      <div class="filter-item">
        <label>結束年份</label>
        <input type="number" id="endYear" placeholder="2026" value="2026">
      </div>
    </div>
  </div>

  <div id="resultsArea"></div>
</main>

<script>
async function runUltraSearch() {
    const q = document.getElementById('mainQ').value;
    const sYear = parseInt(document.getElementById('startYear').value) || 0;
    const eYear = parseInt(document.getElementById('endYear').value) || 9999;
    
    if (!q) return;
    const area = document.getElementById('resultsArea');
    area.innerHTML = '<div style="text-align:center; padding:100px; color:var(--accent)"><i class="ti ti-loader-2 ti-spin" style="font-size:32px"></i><p>正在跨資料庫檢索並篩選時段...</p></div>';

    try {
        const [resPM, resSS, resEP, resCR] = await Promise.all([
            fetchPubMed(q), fetchSemanticScholar(q), fetchEuropePMC(q), fetchCrossref(q)
        ]);
        
        // 合併並進行年份過濾
        let combined = [...resSS, ...resEP, ...resCR, ...resPM];
        let filtered = combined.filter(item => {
            const year = parseInt(item.date);
            return year >= sYear && year <= eYear;
        });

        if (filtered.length === 0) {
            area.innerHTML = '<div style="text-align:center; padding:100px; color:var(--text3)">此時段內查無符合文獻。</div>';
        } else {
            renderResults(filtered);
        }
    } catch (err) { area.innerHTML = '連線失敗。'; }
}

// API Fetch 函數保持不變
async function fetchPubMed(q) { try { const r1 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(q)}&retmode=json&retmax=10`).then(r=>r.json()); const ids = r1.esearchresult.idlist; if (!ids.length) return []; const r2 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`).then(r=>r.json()); return ids.map(id => ({ title: r2.result[id].title, date: parseInt(r2.result[id].pubdate), author: r2.result[id].authors[0]?.name || 'N/A', source: 'PubMed', tag: 'tag-pubmed', url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`, doi: r2.result[id].elocationid?.replace('doi: ', '') })); } catch { return []; } }
async function fetchSemanticScholar(q) { try { const r = await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(q)}&limit=10&fields=title,authors,year,url,abstract,externalIds`).then(r=>r.json()); return (r.data || []).map(item => ({ title: item.title, date: item.year, author: item.authors[0]?.name || 'N/A', abstract: item.abstract, source: 'Semantic Scholar', tag: 'tag-ss', url: item.url, doi: item.externalIds?.DOI })); } catch { return []; } }
async function fetchEuropePMC(q) { try { const r = await fetch(`https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${encodeURIComponent(q)}&format=json&pageSize=10`).then(r=>r.json()); return (r.resultList.result || []).map(item => ({ title: item.title, date: parseInt(item.pubYear), author: item.authorString.split(',')[0], abstract: item.abstractText, source: 'Europe PMC', tag: 'tag-epmc', url: `https://europepmc.org/article/MED/${item.id}`, doi: item.doi })); } catch { return []; } }
async function fetchCrossref(q) { try { const r = await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(q)}&rows=10`).then(r=>r.json()); return (r.message.items || []).map(item => ({ title: item.title[0], date: item.created['date-parts'][0][0], author: item.author ? item.author[0].family : 'N/A', source: 'Crossref', tag: 'tag-crossref', url: item.URL, doi: item.DOI })); } catch { return []; } }

async function checkPDFAvailability(doi) {
    if (!doi) return false;
    try {
        const res = await fetch(`https://api.unpaywall.org/v2/${doi}?email=research@edu.tw`).then(r=>r.json());
        return res.is_oa;
    } catch { return false; }
}

function renderResults(items) {
    const area = document.getElementById('resultsArea');
    area.innerHTML = '';
    items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = `lit-card ${item.tag}`;
        const actionId = `action-${idx}`;
        card.innerHTML = `
            <div class="source-tag">${item.source}</div>
            <a href="${item.url}" target="_blank" class="card-title">${item.title}</a>
            <div class="card-meta">
                <span style="color:var(--amber); font-weight:600"><i class="ti ti-calendar"></i> ${item.date} 年</span>
                <span><i class="ti ti-user"></i> ${item.author} et al.</span>
            </div>
            <div style="font-size:13px; color:var(--text2); margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
                ${item.abstract || '點擊標題查看詳細內容...'}
            </div>
            <div id="${actionId}" class="action-bar">
                <a href="https://scholar.google.com/scholar?q=${encodeURIComponent(item.title)}" target="_blank" class="secondary-btn">
                    <i class="ti ti-brand-google"></i> 學術搜尋鏡像
                </a>
            </div>
        `;
        area.appendChild(card);

        if (item.doi) {
            checkPDFAvailability(item.doi).then(hasPDF => {
                if (hasPDF) {
                    const bar = document.getElementById(actionId);
                    bar.innerHTML = `<a href="https://doi.org/${item.doi}" target="_blank" class="doi-download-btn"><i class="ti ti-file-certificate"></i> 該文獻有 PDF 檔可下載 (由 DOI 前往官網)</a>` + bar.innerHTML;
                }
            });
        }
    });
}
</script>
</body>
