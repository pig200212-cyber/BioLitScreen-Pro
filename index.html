<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BioLitScreen Pro v5.0 - AI Insight</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
  --border: rgba(255,255,255,0.08); --text: #e8edf5; --text3: #6b7280;
  --accent: #3b82f6; --green: #10b981; --amber: #f59e0b; --purple: #a855f7; --r: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
.shell { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

/* 搜尋區塊 */
.search-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 24px; }
.search-input-group { display: flex; gap: 12px; margin-bottom: 16px; height: 50px; }
.input-wrapper { position: relative; flex: 1; }
.input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.input-wrapper input { width: 100%; height: 100%; padding-left: 42px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; box-sizing: border-box; }
.btn-search { background: var(--accent); color: white; border: none; padding: 0 28px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.filter-row { display: flex; gap: 12px; }
.filter-item { flex: 1; background: var(--bg3); border: 1px solid var(--border); padding: 10px 14px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
.filter-item label { font-size: 10px; color: var(--text3); font-weight: 800; }
.filter-item input { background: transparent; border: none; color: var(--accent); font-weight: 700; outline: none; width: 100%; }

/* 文獻卡片 */
.lit-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 16px; position: relative; }
.title { font-size: 18px; font-weight: 600; color: #fff; text-decoration: none; display: block; margin-bottom: 10px; padding-right: 120px; }
.meta { font-size: 13px; color: var(--text3); display: flex; gap: 15px; margin-bottom: 12px; }
.year-tag { color: var(--amber); font-weight: 800; }

/* 按鈕組 */
.action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
.btn-action { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; cursor: pointer; border: none; }
.pdf-btn { background: var(--green); color: white; }
.ai-btn { background: var(--purple); color: white; }

/* AI 總結區塊 */
.ai-summary-box { background: rgba(168, 85, 247, 0.05); border: 1px dashed var(--purple); border-radius: 8px; padding: 15px; margin-top: 15px; display: none; font-size: 14px; line-height: 1.6; }
.ai-summary-box h4 { margin: 0 0 8px 0; color: var(--purple); display: flex; align-items: center; gap: 6px; }
.source-tag { position: absolute; top: 24px; right: 24px; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 4px; font-size: 10px; color: var(--text3); }
</style>
</head>
<body>

<div class="shell">
  <div class="search-card">
    <div class="search-input-group">
      <div class="input-wrapper">
        <i class="ti ti-search"></i>
        <input type="text" id="mainQ" placeholder="輸入關鍵字檢索...">
      </div>
      <button class="btn-search" onclick="executeMegaSearch()"><i class="ti ti-database"></i> 全庫檢索</button>
    </div>
    <div class="filter-row">
      <div class="filter-item"><label>Start</label><input type="number" id="sYear" value="2018"></div>
      <div class="filter-item"><label>End</label><input type="number" id="eYear" value="2026"></div>
    </div>
  </div>
  <div id="statusArea"></div>
  <div id="resultsArea"></div>
</div>

<script>
// 請在此處填入您的 API Key
const GEMINI_API_KEY = 'AIzaSyA5Zn-vHp0nBuUWRsXpZ4QboBeWu5rK6uU';

async function executeMegaSearch() {
    const q = document.getElementById('mainQ').value;
    const sY = parseInt(document.getElementById('sYear').value);
    const eY = parseInt(document.getElementById('eYear').value);
    if(!q) return;

    document.getElementById('resultsArea').innerHTML = '';
    const status = document.getElementById('statusArea');
    status.innerHTML = `<div style="padding:40px; text-align:center; color:var(--accent)"><i class="ti ti-loader-2 ti-spin" style="font-size:32px"></i><p>正在跨庫檢索並同步 PDF 狀態...</p></div>`;

    try {
        const results = await Promise.allSettled([fetchPubMed(q), fetchSemanticScholar(q), fetchCrossref(q), fetchEuropePMC(q)]);
        let allData = [];
        results.forEach(res => { if(res.status === 'fulfilled') allData = [...allData, ...res.value]; });
        let filtered = allData.filter(i => i.year >= sY && i.year <= eY);
        const unique = Array.from(new Map(filtered.map(item => [item.doi || item.title.toLowerCase(), item])).values());
        unique.sort((a, b) => b.year - a.year);
        status.innerHTML = `<p style="color:var(--text3); font-size:13px">找到 ${unique.length} 篇文獻</p>`;
        render(unique);
    } catch(e) { status.innerHTML = "搜尋出錯。"; }
}

async function fetchPubMed(q){ try{ const r=await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${q}&retmode=json&retmax=10`).then(res=>res.json()); const ids=r.esearchresult.idlist; if(!ids.length)return []; const d=await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`).then(res=>res.json()); return ids.map(id=>({ title:d.result[id].title, year:parseInt(d.result[id].pubdate), author:d.result[id].authors?.[0]?.name, doi:d.result[id].elocationid?.replace('doi: ',''), url:`https://pubmed.ncbi.nlm.nih.gov/${id}/`, src:'PubMed' })); }catch{return []}}
async function fetchSemanticScholar(q){ try{ const r=await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${q}&limit=10&fields=title,authors,year,url,externalIds,openAccessPdf,abstract`).then(res=>res.json()); return r.data.map(i=>({ title:i.title, year:i.year, author:i.authors?.[0]?.name, doi:i.externalIds?.DOI, url:i.url, src:'SemanticScholar', pdf:i.openAccessPdf?.url, abstract: i.abstract })); }catch{return []}}
async function fetchCrossref(q){ try{ const r=await fetch(`https://api.crossref.org/works?query=${q}&rows=10`).then(res=>res.json()); return r.message.items.map(i=>({ title:i.title[0], year:i.created['date-parts'][0][0], author:i.author?.[0]?.family, doi:i.DOI, url:i.URL, src:'Crossref' })); }catch{return []}}
async function fetchEuropePMC(q){ try{ const r=await fetch(`https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${q}&format=json&pageSize=10`).then(res=>res.json()); return r.resultList.result.map(i=>({ title:i.title, year:parseInt(i.pubYear), author:i.authorString?.split(',')[0], doi:i.doi, url:`https://europepmc.org/article/MED/${i.id}`, src:'Europe PMC' })); }catch{return []}}

async function askAI(title, abstract, btnElement, targetBoxId) {
    if (!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY') { alert('請先填入 Gemini API Key'); return; }
    
    const box = document.getElementById(targetBoxId);
    box.style.display = 'block';
    box.innerHTML = '<i class="ti ti-loader-2 ti-spin"></i> AI 正在閱讀並整理摘要中...';
    btnElement.disabled = true;

    const prompt = `你是一位生物醫學專家。請針對以下論文標題與摘要進行：
    1. 將標題與摘要精確翻譯成繁體中文。
    2. 提供三個條列式的核心重點總結。
    
    標題：${title}
    摘要：${abstract || '無提供摘要，請根據標題推測研究方向。'}`;

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        const resultText = data.candidates[0].content.parts[0].text;
        box.innerHTML = `<h4><i class="ti ti-sparkles"></i> AI 閱讀筆記</h4><div>${resultText.replace(/\n/g, '<br>')}</div>`;
    } catch (e) {
        box.innerHTML = '<span style="color:red">AI 讀取失敗，請檢查 API Key 或網路狀況。</span>';
    } finally {
        btnElement.disabled = false;
    }
}

function render(items) {
    const area = document.getElementById('resultsArea');
    items.forEach((i, idx) => {
        const pdfId = `pdf-${idx}`;
        const aiId = `ai-box-${idx}`;
        const card = document.createElement('div');
        card.className = 'lit-card';
        card.innerHTML = `
            <div class="source-tag">${i.src}</div>
            <a href="${i.url}" target="_blank" class="title">${i.title}</a>
            <div class="meta">
                <span class="year-tag">${i.year} 年</span>
                <span>${i.author || '未知作者'} et al.</span>
                <span style="opacity:0.6">DOI: ${i.doi || 'N/A'}</span>
            </div>
            <div class="action-row">
                <div id="${pdfId}"></div>
                <button class="btn-action ai-btn" onclick='askAI(\`${i.title.replace(/'/g, "")}\`, \`${(i.abstract || "").replace(/'/g, "")}\`, this, "${aiId}")'>
                    <i class="ti ti-sparkles"></i> AI 摘要總結
                </button>
            </div>
            <div id="${aiId}" class="ai-summary-box"></div>
        `;
        area.appendChild(card);
        
        if(i.pdf) document.getElementById(pdfId).innerHTML = `<a href="${i.pdf}" target="_blank" class="btn-action pdf-btn"><i class="ti ti-file-download"></i> 直接 PDF</a>`;
        else if(i.doi) checkPDF(i.doi, pdfId);
    });
}

async function checkPDF(doi, boxId) {
    try {
        const res = await fetch(`https://api.unpaywall.org/v2/${doi}?email=un@example.com`).then(r=>r.json());
        if(res.is_oa) {
            const url = res.best_oa_location.url_for_pdf || res.best_oa_location.url;
            document.getElementById(boxId).innerHTML = `<a href="${url}" target="_blank" class="btn-action pdf-btn"><i class="ti ti-file-download"></i> PDF 全文</a>`;
        }
    } catch(e){}
}
</script>
</body>
</html>
