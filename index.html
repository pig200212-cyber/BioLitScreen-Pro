<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BioLitScreen Pro v6.0 | 旗艦文獻檢索系統</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
  --border: rgba(255,255,255,0.1); --text: #e8edf5; --text3: #94a3b8;
  --accent: #3b82f6; --green: #10b981; --amber: #f59e0b; --purple: #a855f7; --r: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
.shell { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

/* 搜尋區塊修復 */
.search-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 30px; margin-bottom: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
.input-row { display: flex; gap: 12px; margin-bottom: 20px; }
.input-wrapper { position: relative; flex: 1; }
.input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.input-wrapper input { width: 100%; height: 52px; padding-left: 48px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
.input-wrapper input:focus { border-color: var(--accent); }

.btn-primary { background: var(--accent); color: white; border: none; padding: 0 30px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 15px; flex-shrink: 0; }
.filter-bar { display: flex; gap: 12px; align-items: center; }
.filter-box { background: var(--bg3); border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
.filter-box label { font-size: 10px; font-weight: 800; color: var(--text3); text-transform: uppercase; }
.filter-box input { background: transparent; border: none; color: var(--accent); font-weight: 700; width: 50px; outline: none; }
.btn-key { background: #334155; color: #cbd5e1; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }

/* 卡片與按鈕 */
.lit-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 25px; margin-bottom: 20px; position: relative; border-left: 4px solid transparent; }
.lit-item:hover { border-left-color: var(--accent); background: #161e2e; }
.source-tag { position: absolute; top: 25px; right: 25px; font-size: 10px; color: var(--text3); background: var(--bg3); padding: 2px 8px; border-radius: 4px; }
.title { font-size: 18px; font-weight: 700; color: #fff; text-decoration: none; display: block; margin-bottom: 12px; padding-right: 80px; }
.meta { display: flex; gap: 15px; font-size: 13px; color: var(--text3); margin-bottom: 15px; }
.year { color: var(--amber); font-weight: 800; }

.action-row { display: flex; gap: 10px; }
.btn-ui { height: 36px; padding: 0 15px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; border: none; color: white; }
.btn-pdf { background: var(--green); }
.btn-ai { background: var(--purple); }

.ai-box { margin-top: 20px; padding: 20px; background: rgba(168, 85, 247, 0.05); border: 1px dashed var(--purple); border-radius: 10px; display: none; font-size: 14px; line-height: 1.8; color: #d1d5db; }
</style>
</head>
<body>

<div class="shell">
  <div class="search-card">
    <div class="input-row">
      <div class="input-wrapper">
        <i class="ti ti-search"></i>
        <input type="text" id="q" placeholder="例如: Acteoside cancer A549...">
      </div>
      <button class="btn-primary" onclick="search()"><i class="ti ti-bolt"></i> 執行檢索</button>
    </div>
    <div class="filter-bar">
      <div class="filter-box"><label>From</label><input type="number" id="sy" value="2018"></div>
      <div class="filter-box"><label>To</label><input type="number" id="ey" value="2026"></div>
      <button class="btn-key" onclick="setKey()"><i class="ti ti-key"></i> 設定 API Key</button>
    </div>
  </div>
  <div id="status" style="font-size:13px; color:var(--text3); margin-bottom:15px"></div>
  <div id="results"></div>
</div>

<script>
let currentKey = localStorage.getItem('gemini_v6_key') || "";

function setKey() {
    const k = prompt("請輸入 Gemini API Key：", currentKey);
    if(k) { currentKey = k; localStorage.setItem('gemini_v6_key', k); alert("Key 已儲存！"); }
}

async function search() {
    const query = document.getElementById('q').value;
    const sy = document.getElementById('sy').value;
    const ey = document.getElementById('ey').value;
    if(!query) return;

    const resArea = document.getElementById('results');
    const status = document.getElementById('status');
    resArea.innerHTML = '';
    status.innerHTML = `<i class="ti ti-loader-2 ti-spin"></i> 正在請求 API 端過濾 ${sy}-${ey} 年份數據...`;

    // 核心改進：年份過濾推送到 API 請求中
    const tasks = [
        fetchPM(query, sy, ey),
        fetchSS(query),
        fetchEP(query, sy, ey),
        fetchCR(query)
    ];

    const allResults = await Promise.allSettled(tasks);
    let combined = [];
    allResults.forEach(r => { if(r.status==='fulfilled') combined = [...combined, ...r.value]; });

    // 二次本地精確篩選
    const final = combined.filter(i => i.year >= sy && i.year <= ey);
    const unique = Array.from(new Map(final.map(i => [i.doi || i.title.toLowerCase(), i])).values());
    unique.sort((a,b) => b.year - a.year);

    status.innerHTML = `共找到 ${unique.length} 篇符合條件的文獻`;
    render(unique);
}

// 修復各平台的年份抓取與 DOI 格式
async function fetchPM(q, s, e){
    try{
        const url = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${q}+AND+(${s}[PDAT]:${e}[PDAT])&retmode=json&retmax=20`;
        const r = await fetch(url).then(res=>res.json());
        const ids = r.esearchresult.idlist;
        if(!ids.length) return [];
        const d = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`).then(res=>res.json());
        return ids.map(id => ({
            title: d.result[id].title,
            year: parseInt(d.result[id].pubdate.match(/\d{4}/)?.[0] || 0),
            author: d.result[id].authors?.[0]?.name,
            doi: d.result[id].elocationid?.replace('doi: ', ''),
            url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`,
            src: 'PubMed'
        }));
    }catch{return []}
}

async function fetchEP(q, s, e){
    try{
        const url = `https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${q}%20AND%20(FIRST_PDATE:[${s}%20TO%20${e}])&format=json&pageSize=20`;
        const r = await fetch(url).then(res=>res.json());
        return r.resultList.result.map(i => ({
            title: i.title,
            year: parseInt(i.pubYear),
            author: i.authorString?.split(',')[0],
            doi: i.doi,
            url: `https://europepmc.org/article/MED/${i.id}`,
            src: 'Europe PMC'
        }));
    }catch{return []}
}

async function fetchSS(q){ try{ const r=await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${q}&limit=20&fields=title,authors,year,url,externalIds,openAccessPdf,abstract`).then(res=>res.json()); return r.data.map(i=>({ title:i.title, year:i.year, author:i.authors?.[0]?.name, doi:i.externalIds?.DOI, url:i.url, src:'SemanticScholar', pdf:i.openAccessPdf?.url, abstract:i.abstract })); }catch{return []}}
async function fetchCR(q){ try{ const r=await fetch(`https://api.crossref.org/works?query=${q}&rows=20`).then(res=>res.json()); return r.message.items.map(i=>({ title:i.title[0], year:i.created['date-parts'][0][0], author:i.author?.[0]?.family, doi:i.DOI, url:i.URL, src:'Crossref' })); }catch{return []}}

async function askAI(title, abstract, btn, boxId) {
    if(!currentKey) { alert("請先設定 API Key"); return; }
    const box = document.getElementById(boxId);
    box.style.display = 'block';
    box.innerHTML = '<i class="ti ti-loader-2 ti-spin"></i> AI 正在分析...';
    btn.disabled = true;

    // 修復：徹底清洗引號與特殊符號
    const cleanTitle = title.replace(/["'`]/g, '');
    const cleanAbs = (abstract || "此文獻未提供摘要，請根據標題進行推論。").replace(/["'`]/g, '').substring(0, 2000);

    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${currentKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `你是一位資深生醫科學家。請翻譯標題並給出三個繁體中文要點。標題：${cleanTitle}。摘要內容：${cleanAbs}` }]
                }]
            })
        });
        const data = await resp.json();
        const output = data.candidates[0].content.parts[0].text;
        box.innerHTML = `<strong><i class="ti ti-sparkles"></i> AI 研讀結論：</strong><br>${output.replace(/\n/g, '<br>')}`;
    } catch(e) {
        box.innerHTML = `<span style="color:#ef4444">❌ AI 連線失敗：請檢查 API Key 或網路環境。</span>`;
    } finally { btn.disabled = false; }
}

async function fetchPDF(doi, elId) {
    if(!doi) return;
    try {
        const res = await fetch(`https://api.unpaywall.org/v2/${doi}?email=un@example.com`).then(r=>r.json());
        if(res.is_oa) {
            const url = res.best_oa_location.url_for_pdf || res.best_oa_location.url;
            document.getElementById(elId).innerHTML = `<a href="${url}" target="_blank" class="btn-ui btn-pdf"><i class="ti ti-file-download"></i> PDF 全文</a>`;
        }
    } catch(e){}
}

function render(items) {
    const area = document.getElementById('results');
    items.forEach((item, idx) => {
        const pId = `pdf-${idx}`;
        const aId = `ai-${idx}`;
        const card = document.createElement('div');
        card.className = 'lit-item';
        card.innerHTML = `
            <div class="source-tag">${item.src}</div>
            <a href="${item.url}" target="_blank" class="title">${item.title}</a>
            <div class="meta">
                <span class="year">${item.year} 年</span>
                <span>${item.author || '未知作者'} et al.</span>
            </div>
            <div class="action-row">
                <div id="${pId}"></div>
                <button class="btn-ui btn-ai" onclick="askAI(\`${item.title.replace(/'|`/g, "")}\`, \`${(item.abstract || "").replace(/'|`/g, "")}\`, this, '${aId}')">
                    <i class="ti ti-sparkles"></i> AI 總結
                </button>
            </div>
            <div id="${aId}" class="ai-box"></div>
        `;
        area.appendChild(card);
        if(item.pdf) document.getElementById(pId).innerHTML = `<a href="${item.pdf}" target="_blank" class="btn-ui btn-pdf"><i class="ti ti-file-download"></i> PDF 下載</a>`;
        else if(item.doi) fetchPDF(item.doi, pId);
    });
}
</script>
</body>
</html>
