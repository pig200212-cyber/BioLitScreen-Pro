<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioLitScreen Pro v3.8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0b0f1a; --bg2: #111827; --bg3: #1a2236;
  --border: rgba(255,255,255,0.07); --text: #e8edf5; --text2: #8b97b0; --text3: #5c6b82;
  --accent: #3b82f6; --green: #10b981; --amber: #f59e0b;
  --r: 12px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
.shell { max-width: 1000px; margin: 0 auto; padding: 24px 20px; }

/* --- 修正後的搜尋區塊 --- */
.search-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }

.search-input-group { 
  display: flex; 
  gap: 12px; 
  margin-bottom: 16px; 
  align-items: center; 
  flex-wrap: nowrap; /* 強制不換行，避免按鈕跑掉 */
}

.input-wrapper { 
  position: relative; 
  flex-grow: 1; /* 讓輸入框佔據剩餘空間 */
  min-width: 0; /* 防止 flex 項目溢出 */
}

.input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); z-index: 2; }

.input-wrapper input { 
  width: 100%; 
  padding: 14px 14px 14px 42px; 
  background: var(--bg3); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  color: var(--text); 
  outline: none; 
  font-size: 15px;
  box-sizing: border-box;
}

.btn-search { 
  background: var(--accent); 
  color: #fff; 
  border: none; 
  padding: 0 24px; 
  height: 48px; 
  border-radius: 8px; 
  font-weight: 600; 
  cursor: pointer; 
  white-space: nowrap; /* 確保「執行檢索」文字不換行 */
  flex-shrink: 0; /* 防止按鈕被壓縮 */
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-row { display: flex; gap: 12px; }
.filter-item { flex: 1; background: var(--bg3); border: 1px solid var(--border); padding: 10px 14px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
.filter-item label { font-size: 11px; color: var(--text3); font-weight: 800; text-transform: uppercase; }
.filter-item input { background: transparent; border: none; color: var(--accent); font-weight: 600; width: 100%; outline: none; }

/* 文獻卡片與 PDF 標籤 */
.lit-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 16px; display: flex; gap: 16px; position: relative; border-left: 4px solid var(--text3); }
.content-area { flex: 1; }
.card-title { font-size: 17px; font-weight: 600; color: var(--text); text-decoration: none; display: block; margin-bottom: 10px; line-height: 1.4; padding-right: 100px; }
.card-meta { font-size: 13px; color: var(--text3); display: flex; gap: 15px; margin-bottom: 12px; }
.year-tag { color: var(--amber); font-weight: 700; }
.pdf-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--green); color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; text-decoration: none; margin-top: 10px; }
.source-tag { position: absolute; top: 24px; right: 24px; font-size: 10px; font-weight: 800; opacity: 0.5; }

/* 勾選列 */
.cart-bar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 24px; border-radius: 40px; display: none; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(59,130,246,0.4); z-index: 1000; }
</style>
</head>
<body>

<div class="shell">
  <div class="search-card">
    <div class="search-input-group">
      <div class="input-wrapper">
        <i class="ti ti-search"></i>
        <input type="text" id="mainQ" placeholder="搜尋研究關鍵字...">
      </div>
      <button class="btn-search" onclick="runSearch()"><i class="ti ti-bolt"></i> 執行檢索</button>
    </div>
    <div class="filter-row">
      <div class="filter-item"><label>Start</label><input type="number" id="sYear" value="2018"></div>
      <div class="filter-item"><label>End</label><input type="number" id="eYear" value="2026"></div>
    </div>
  </div>
  <div id="resultsArea"></div>
</div>

<div id="cartBar" class="cart-bar">
  <span id="cartCount">已選取 0 篇</span>
  <button onclick="alert('APA 生成功能已準備就緒')" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:15px; cursor:pointer;">生成引用</button>
</div>

<script>
let selected = [];

async function runSearch() {
    const q = document.getElementById('mainQ').value;
    const sYear = parseInt(document.getElementById('sYear').value);
    const eYear = parseInt(document.getElementById('eYear').value);
    if(!q) return;

    const area = document.getElementById('resultsArea');
    area.innerHTML = '<div style="text-align:center; padding:50px"><i class="ti ti-loader-2 ti-spin" style="font-size:32px; color:var(--accent)"></i></div>';

    try {
        const [rPM, rSS] = await Promise.all([fetchPM(q), fetchSS(q)]);
        let all = [...rPM, ...rSS];
        
        // --- 核心修正：年份篩選邏輯 ---
        // 確保排除 NaN 的年份，並嚴格執行閉區間 [sYear, eYear] 篩選
        let filtered = all.filter(item => {
            const y = parseInt(item.year);
            return !isNaN(y) && y >= sYear && y <= eYear;
        });

        // 按年份降序排序（最新在前）
        filtered.sort((a, b) => b.year - a.year);

        render(filtered);
    } catch(e) { area.innerHTML = "檢索失敗，請檢查網路連線。"; }
}

async function fetchPM(q){ try{ const r=await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${q}&retmode=json&retmax=10`).then(res=>res.json()); const ids=r.esearchresult.idlist; if(!ids.length)return []; const d=await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`).then(res=>res.json()); return ids.map(id=>({ title: d.result[id].title, year: parseInt(d.result[id].pubdate), author: d.result[id].authors?.[0]?.name, journal: d.result[id].fulljournalname, doi: d.result[id].elocationid?.replace('doi: ',''), url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`, src:'PubMed'})); }catch{return []}}
async function fetchSS(q){ try{ const r=await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${q}&limit=10&fields=title,authors,year,url,externalIds,venue`).then(res=>res.json()); return r.data.map(i=>({ title: i.title, year: i.year, author: i.authors?.[0]?.name, journal: i.venue, doi: i.externalIds?.DOI, url: i.url, src:'SemanticScholar'})); }catch{return []}}

async function checkPDF(doi, targetId) {
    if(!doi) return;
    try {
        const res = await fetch(`https://api.unpaywall.org/v2/${doi}?email=un@example.com`).then(r=>r.json());
        if(res.is_oa) {
            const link = res.best_oa_location.url_for_pdf || res.best_oa_location.url;
            document.getElementById(targetId).innerHTML += `<a href="${link}" target="_blank" class="pdf-badge"><i class="ti ti-file-download"></i> PDF 檔可下載</a>`;
        }
    } catch(e){}
}

function render(items) {
    const area = document.getElementById('resultsArea');
    area.innerHTML = items.length ? '' : '<div style="text-align:center; padding:50px; color:var(--text3)">找不到符合年份條件的文獻。</div>';
    
    items.forEach((item, idx) => {
        const pdfId = `pdf-${idx}`;
        const card = document.createElement('div');
        card.className = 'lit-card';
        card.innerHTML = `
            <div style="padding-top:4px"><input type="checkbox" onchange='toggleCart(${JSON.stringify(item).replace(/'/g, "&apos;")}, this.checked)'></div>
            <div class="content-area">
                <div class="source-tag">${item.src}</div>
                <a href="${item.url}" target="_blank" class="card-title">${item.title}</a>
                <div class="card-meta">
                    <span class="year-tag">${item.year}</span>
                    <span>${item.author || 'N/A'} et al.</span>
                    <span style="opacity:0.5">${item.journal || ''}</span>
                </div>
                <div id="${pdfId}"></div>
            </div>
        `;
        area.appendChild(card);
        if(item.doi) checkPDF(item.doi, pdfId);
    });
}

function toggleCart(item, isAdd) {
    if(isAdd) selected.push(item);
    else selected = selected.filter(i => i.doi !== item.doi);
    const bar = document.getElementById('cartBar');
    document.getElementById('cartCount').innerText = `已選取 ${selected.length} 篇`;
    bar.style.display = selected.length > 0 ? 'flex' : 'none';
}
</script>
</body>
</html>
