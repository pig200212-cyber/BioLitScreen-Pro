<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>BioLitScreen Pro v7.2 | PDF 穩定下載版</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0f172a; --bg-card: #1e293b; --bg-input: #334155;
  --text: #f1f5f9; --text-dim: #94a3b8; --accent: #38bdf8;
  --green: #10b981; --amber: #f59e0b; --border: rgba(255,255,255,0.1); --r: 12px;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
.shell { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
.search-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 25px; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
.input-row { display: flex; gap: 10px; margin-bottom: 15px; }
.input-group { position: relative; flex: 1; }
.input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
.input-group input { width: 100%; height: 48px; padding-left: 44px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box; }
.btn-search { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.filter-row { display: flex; gap: 15px; align-items: center; }
.filter-item input { background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--accent); font-weight: 700; width: 65px; padding: 4px 8px; outline: none; }

.lit-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 16px; position: relative; transition: 0.2s; border-left: 5px solid transparent; }
.lit-card:hover { transform: translateY(-3px); border-left-color: var(--accent); }
.tag { position: absolute; top: 20px; right: 20px; font-size: 10px; background: rgba(56,189,248,0.1); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-weight: 700; }
.title { font-size: 17px; font-weight: 700; color: #fff; text-decoration: none; display: block; margin-bottom: 10px; padding-right: 120px; line-height: 1.4; }
.meta { font-size: 13px; color: var(--text-dim); margin-bottom: 15px; }
.year-tag { color: var(--amber); font-weight: 700; margin-right: 10px; }

/* 按鈕美化 */
.btn-group { display: flex; gap: 10px; }
.btn-ui { height: 34px; padding: 0 15px; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; border: none; cursor: pointer; transition: 0.2s; color: white; }
.btn-pdf { background: var(--green); }
.btn-doi { background: #475569; }
.btn-ui:hover { filter: brightness(1.2); transform: scale(1.02); }
</style>
</head>
<body>

<div class="shell">
  <div class="search-card">
    <div class="input-row">
      <div class="input-group"><i class="ti ti-search"></i><input type="text" id="q" placeholder="例如: Acteoside cancer mechanism..."></div>
      <button class="btn-search" onclick="doSearch()"><i class="ti ti-bolt"></i> 搜尋</button>
    </div>
    <div class="filter-row">
      <div class="filter-item"><label>From</label><input type="number" id="sy" value="2018"></div>
      <div class="filter-item"><label>To</label><input type="number" id="ey" value="2026"></div>
      <span id="stat" style="font-size:12px; color:var(--text-dim); margin-left: auto;"></span>
    </div>
  </div>
  <div id="res"></div>
</div>

<script>
async function doSearch() {
    const q = document.getElementById('q').value;
    const sy = document.getElementById('sy').value;
    const ey = document.getElementById('ey').value;
    if(!q) return;

    document.getElementById('stat').innerHTML = `<i class="ti ti-loader-2 ti-spin"></i> 正在檢索...`;
    document.getElementById('res').innerHTML = '';

    const tasks = [fetchPubMed(q,sy,ey), fetchEuropePMC(q,sy,ey), fetchSemanticScholar(q), fetchCrossref(q)];
    const results = await Promise.allSettled(tasks);
    let all = [];
    results.forEach(r => { if(r.status==='fulfilled') all = [...all, ...r.value]; });

    const filtered = all.filter(i => i.year >= sy && i.year <= ey);
    const unique = Array.from(new Map(filtered.map(i => [i.doi || i.title.toLowerCase(), i])).values());
    unique.sort((a,b) => b.year - a.year);

    document.getElementById('stat').innerHTML = `找到 ${unique.length} 篇結果`;
    render(unique);
}

// 核心：強化 PDF 偵測，除了 Unpaywall，還直接從各平台獲取原始路徑
async function fetchPDF(doi, paperId) {
    if(!doi) return;
    const btnBox = document.getElementById(paperId);
    
    // 策略 1: 使用 Unpaywall API 尋找免費 PDF
    try {
        const up = await fetch(`https://api.unpaywall.org/v2/${doi}?email=un@example.com`).then(r=>r.json());
        if(up.is_oa && up.best_oa_location?.url_for_pdf) {
            btnBox.innerHTML += `<a href="${up.best_oa_location.url_for_pdf}" target="_blank" class="btn-ui btn-pdf"><i class="ti ti-file-download"></i> PDF 下載</a>`;
            return;
        }
    } catch(e){}

    // 策略 2: 如果沒找到 PDF，至少產生一個 DOI 的官方連結（利用校園網域下載）
    btnBox.innerHTML += `<a href="https://doi.org/${doi}" target="_blank" class="btn-ui btn-doi"><i class="ti ti-external-link"></i> 出版社原文</a>`;
}

// 各平台 API (保持 v7.1 優化後的年份過濾邏輯)
async function fetchPubMed(q,s,e){ try { const r = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${q}+AND+(${s}[PDAT]:${e}[PDAT])&retmode=json&retmax=15`).then(res=>res.json()); const ids = r.esearchresult.idlist; if(!ids.length) return []; const d = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`).then(res=>res.json()); return ids.map(id => ({ title: d.result[id].title, year: parseInt(d.result[id].pubdate.match(/\d{4}/)?.[0] || 0), author: d.result[id].authors?.[0]?.name, doi: d.result[id].elocationid?.replace('doi: ', ''), url: `https://pubmed.ncbi.nlm.nih.gov/${id}/`, src: 'PubMed' })); } catch { return []; } }
async function fetchEuropePMC(q,s,e){ try { const r = await fetch(`https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${q}%20AND%20(FIRST_PDATE:[${s}%20TO%20${e}])&format=json&pageSize=15`).then(res=>res.json()); return r.resultList.result.map(i => ({ title: i.title, year: parseInt(i.pubYear), author: i.authorString?.split(',')[0], doi: i.doi, url: `https://europepmc.org/article/MED/${i.id}`, src: 'Europe PMC' })); } catch { return []; } }
async function fetchSemanticScholar(q){ try { const r = await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${q}&limit=15&fields=title,authors,year,url,externalIds,openAccessPdf`).then(res=>res.json()); return r.data.map(i => ({ title: i.title, year: i.year, author: i.authors?.[0]?.name, doi: i.externalIds?.DOI, url: i.url, src: 'Semantic Scholar', pdf: i.openAccessPdf?.url })); } catch { return []; } }
async function fetchCrossref(q){ try { const r = await fetch(`https://api.crossref.org/works?query=${q}&rows=15`).then(res=>res.json()); return r.message.items.map(i => ({ title: i.title[0], year: i.created['date-parts'][0][0], author: i.author?.[0]?.family, doi: i.DOI, url: i.URL, src: 'Crossref' })); } catch { return []; } }

function render(items) {
    const area = document.getElementById('res');
    items.forEach((item, idx) => {
        const btnId = `btn-box-${idx}`;
        const card = document.createElement('div');
        card.className = 'lit-card';
        card.innerHTML = `
            <div class="tag">${item.src}</div>
            <a href="${item.url}" target="_blank" class="title">${item.title}</a>
            <div class="meta">
                <span class="year-tag">${item.year} 年</span>
                <span>${item.author || '未知作者'} et al.</span>
            </div>
            <div class="btn-group" id="${btnId}"></div>
        `;
        area.appendChild(card);
        
        // 優先顯示 API 帶來的 PDF，否則啟動深層偵測
        if(item.pdf) {
            document.getElementById(btnId).innerHTML = `<a href="${item.pdf}" target="_blank" class="btn-ui btn-pdf"><i class="ti ti-file-download"></i> PDF 下載</a>`;
        } else {
            fetchPDF(item.doi, btnId);
        }
    });
}
</script>
</body>
</html>
